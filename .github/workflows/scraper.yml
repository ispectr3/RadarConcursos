name: Radar Concursos

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Cache SQLite
        id: cache-db
        uses: actions/cache@v5
        with:
          path: data/
          key: radar-db

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Executar radar
        run: python run_once.py
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          FREE_API_KEY: ${{ secrets.FREE_API_KEY }}
          FREE_API_ENTRIES: ${{ secrets.FREE_API_ENTRIES }}
          FETCH_FULL_ARTICLE: 'True'
          ONLY_DISCOVERED_TODAY: 'False'
          SCHEDULER_TIMEZONE: 'America/Sao_Paulo'

      - name: Gerar site estático
        run: python generate_static_site.py

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

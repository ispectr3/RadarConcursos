<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Radar Concursos{% endblock %}</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: #0f172a; color: #e2e8f0; line-height: 1.6;
}
a { color: #60a5fa; text-decoration: none; }
a:hover { text-decoration: underline; }
header {
  background: #1e293b; border-bottom: 1px solid #334155; padding: 1rem 2rem;
  display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 1rem;
}
header h1 { font-size: 1.25rem; color: #facc15; }
header h1 span { color: #64748b; }
nav { display: flex; gap: 1rem; }
nav a { color: #94a3b8; font-size: 0.875rem; padding: 0.25rem 0.5rem; border-radius: 0.25rem; }
nav a:hover { color: #e2e8f0; background: #334155; text-decoration: none; }
nav a.active { color: #facc15; background: #334155; }
.container { max-width: 1200px; margin: 0 auto; padding: 2rem; }
.stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
.stat-card {
  background: #1e293b; border: 1px solid #334155; border-radius: 0.5rem; padding: 1.25rem;
}
.stat-card .number { font-size: 1.75rem; font-weight: 700; color: #facc15; }
.stat-card .label { font-size: 0.75rem; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.05em; }
.filters { display: flex; gap: 0.75rem; flex-wrap: wrap; margin-bottom: 1.5rem; align-items: center; }
.filters input, .filters select {
  background: #1e293b; border: 1px solid #475569; color: #e2e8f0;
  padding: 0.5rem 0.75rem; border-radius: 0.375rem; font-size: 0.875rem;
}
.filters input:focus, .filters select:focus { outline: none; border-color: #60a5fa; }
.filters input { min-width: 200px; }
.filters label { font-size: 0.75rem; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.05em; }
.btn {
  display: inline-block; padding: 0.5rem 1rem; border-radius: 0.375rem;
  font-size: 0.875rem; font-weight: 500; border: none; cursor: pointer;
  background: #2563eb; color: #fff; transition: background 0.15s;
}
.btn:hover { background: #1d4ed8; text-decoration: none; }
table { width: 100%; border-collapse: collapse; }
th { text-align: left; padding: 0.75rem 0.5rem; font-size: 0.75rem; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.05em; border-bottom: 1px solid #334155; }
td { padding: 0.75rem 0.5rem; border-bottom: 1px solid #1e293b; font-size: 0.875rem; }
tr:hover td { background: #1e293b; }
.source-badge {
  display: inline-block; padding: 0.125rem 0.5rem; border-radius: 999px;
  font-size: 0.75rem; font-weight: 500;
}
.source-acheconcursos { background: #1e3a5f; color: #93c5fd; }
.source-pciconcursos { background: #3b1e5f; color: #c4b5fd; }
.source-folhadirigida { background: #1e5f3a; color: #86efac; }
.source-grancursos { background: #5f3a1e; color: #fdba74; }
.source-estrategiaconcursos { background: #5f1e3a; color: #f9a8d4; }
.source-legacy { background: #334155; color: #94a3b8; }
.pagination { display: flex; gap: 0.5rem; justify-content: center; margin-top: 1.5rem; }
.pagination a, .pagination span {
  padding: 0.375rem 0.75rem; border-radius: 0.25rem; background: #1e293b;
  color: #94a3b8; font-size: 0.875rem;
}
.pagination a:hover { background: #334155; color: #e2e8f0; text-decoration: none; }
.pagination .current { background: #2563eb; color: #fff; }
.empty { text-align: center; padding: 3rem; color: #64748b; }
.tag { display: inline-block; padding: 0.125rem 0.375rem; border-radius: 0.25rem; font-size: 0.75rem; background: #1e293b; color: #94a3b8; margin: 0.125rem; }
.detail-card { background: #1e293b; border: 1px solid #334155; border-radius: 0.5rem; padding: 2rem; }
.detail-card h2 { font-size: 1.25rem; margin-bottom: 1rem; }
.detail-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1rem; }
.detail-field { }
.detail-field .field-label { font-size: 0.75rem; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; }
.detail-field .field-value { font-size: 0.9375rem; }
.salary-high { color: #facc15; font-weight: 600; }
.salary-mid { color: #86efac; font-weight: 600; }
.prazo-urgente { color: #fca5a5; font-weight: 600; }
footer { text-align: center; padding: 2rem; color: #475569; font-size: 0.75rem; }
</style>
</head>
<body>
<header>
  <h1>🎯 Radar Concursos <span>dashboard</span></h1>
  <nav>
    <a href="/" class="{% if request.url.path == '/' %}active{% endif %}">Visão Geral</a>
    <a href="/editais" class="{% if '/editais' in request.url.path and request.url.path != '/' %}active{% endif %}">Editais</a>
  </nav>
</header>
<div class="container">
{% block content %}{% endblock %}
</div>
<footer>Radar Concursos &mdash; Dados do banco local SQLite</footer>
</body>
</html>
